<!doctype html>
<html lang="es">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <meta name="theme-color" content="#2d5a27">
    <meta
      name="description"
      content="PWA de captura geoespacial para exploracion de campo con ArcGIS, soporte offline e IndexedDB."
    >
    <title>PWA Exploracion</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link
      href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap"
      rel="stylesheet"
      media="print"
      onload="this.media='all'"
    >
    <noscript>
      <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    </noscript>
    <link
      rel="stylesheet"
      href="https://js.arcgis.com/4.33/@arcgis/core/assets/esri/themes/light/main.css"
      media="print"
      onload="this.media='all'"
    >
    <link rel="manifest" href="./manifest.webmanifest">
    <link rel="icon" href="./assets/icons/icon-192.png" type="image/png">
    <link rel="apple-touch-icon" href="./assets/icons/icon-192.png">
    <link rel="stylesheet" href="./css/reset.css">
    <link rel="stylesheet" href="./css/variables.css">
    <link rel="stylesheet" href="./css/layout.css">
    <link rel="stylesheet" href="./css/components.css">
    <link rel="stylesheet" href="./css/app.css">
  </head>
  <body>
    <script src="./js/vendor/proj4.js"></script>
    <div id="app" class="app-shell"></div>
    <div id="toast-root" class="toast-root" aria-live="polite" aria-atomic="true"></div>
    <dialog id="app-modal" class="app-modal"></dialog>
    <script type="module" src="./js/app.js"></script>
  </body>
</html>
